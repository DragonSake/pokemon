<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <title>Who is that Pokémon</title>
</head>
<body>

<div class="game-container">

    <h1 id="message"></h1>
        <img id="pokemon-image" src="" alt="Laden..." style="display: none;">
        
        <div class="ui-container">
            <h2>Who is that Pokémon?</h2>
            <input type="text" id="guess-input" placeholder="Type the name...">
            <div class="button-group">
                <button id="btn-guess" onclick="checkGuess()">Guess!</button>
                <button id="btn-next" onclick="nextPokemon()">Next</button>
            </div>
        </div>
    </div>

    <script src="js/js.js"></script>
</body>

</html>
